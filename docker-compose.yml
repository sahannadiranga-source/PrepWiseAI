services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${DB_SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_SA_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: PrepWise.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db;Database=PrepWise;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Gemini__ApiKey: ${GEMINI_API_KEY}
      CorsOrigins__Blazor: ${CORS_BLAZOR_ORIGIN}
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: PrepWise.Client/Dockerfile
    ports:
      - "5000:80"
    volumes:
      - ./PrepWise.Client/wwwroot/appsettings.Docker.json:/usr/share/nginx/html/appsettings.json:ro
    depends_on:
      - api

volumes:
  sqldata:
