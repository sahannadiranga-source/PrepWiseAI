name: Build & Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build API
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/prepwise-api -f PrepWise.API/Dockerfile .

    - name: Build Client
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/prepwise-client -f PrepWise.Client/Dockerfile .

    - name: Push API
      run: docker push ${{ secrets.DOCKER_USERNAME }}/prepwise-api:latest

    - name: Push Client
      run: docker push ${{ secrets.DOCKER_USERNAME }}/prepwise-client:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/PrepWiseAI
          docker-compose down
          docker-compose pull
          docker-compose up -d
